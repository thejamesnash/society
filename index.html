<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SVG to Three.js Mesh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    main {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font: normal 5vw/1 Georgia;
      color: #FFF;
      text-shadow: 0 0 10px #000;
    }
  </style>
</head>
<body>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 220);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffe0a0, 2.0));

    const lights = [
      [0xfff5cc, 2.0,  80,  120,  100],
      [0xffcc44, 1.5, -80,  -40,   60],
      [0xffaa00, 1.5,   0, -100,  -80],
      [0xfff0cc, 1.5, -60,   80, -100],
      [0xffdd88, 1.5,   0, -120,   50],
      [0xffeebb, 1.5, 100,  -60,   30],
      [0xffffcc, 1.5, -100,  60,  -30],
      [0xffcc88, 1.5,   0,  100,  -60],
    ];
    lights.forEach(([color, intensity, x, y, z]) => {
      const l = new THREE.DirectionalLight(color, intensity);
      l.position.set(x, y, z);
      scene.add(l);
    });

    const group = new THREE.Group();

    const material = new THREE.MeshStandardMaterial({
      color: 0xFFD700,
      metalness: 1,
      roughness: 0.2,
      side: THREE.DoubleSide,
    });

    const box = new THREE.Box3().setFromObject(group);
    const centre = box.getCenter(new THREE.Vector3());
    group.position.sub(centre);

    const spectreShape = new THREE.Shape()
      .moveTo( 0, -60 )
      .lineTo( 40, 0 )
      .lineTo( 0, 60 )
      .lineTo( -40, 0 )
      .lineTo( 0, -60 );
    
    const hole1 = new THREE.Shape()
      .moveTo( 0, 0 )
      .lineTo( -30, 0 )
      .lineTo( -15, -22.5 )
      .lineTo( 0, 0 );
    const hole2 = new THREE.Shape()
      .moveTo( 0, 0 )
      .lineTo( 30, 0 )
      .lineTo( 15, 22.5 )
      .lineTo( 0, 0 );
      
    spectreShape.holes.push(hole1);
    spectreShape.holes.push(hole2);

    const extrusionSettings = {
      depth: 40,
      bevelEnabled: true,
      bevelThickness: 2,
      bevelSize: 2,
      bevelSegments: 1,
      material: 0,
      extrudeMaterial: 1
    };

    const spectreGeo = new THREE.ExtrudeGeometry( spectreShape, extrusionSettings );
    const spectreMesh = new THREE.Mesh( spectreGeo, material ) ;
    
    group.add( spectreMesh );
    scene.add(group);

    const mesh = group;

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    let rotX = 0, rotY = 0;

    let autoRotate = true;

    (function animate(t) {
      requestAnimationFrame(animate);
      rotY = t * 0.0005;
      rotX = Math.sin(t * 0.0003) * 0.3;
      mesh.rotation.x = rotX;
      mesh.rotation.y = rotY;
      renderer.render(scene, camera);
    })(0);
  </script>
  <main>
    <h1>soc.iety</h1>
  </main>
</body>
</html>
